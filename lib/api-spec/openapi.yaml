components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegisterBody:
      type: object
      properties:
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        account_type:
          type: string
          enum: [client, supplier]
        company_name:
          type: string
      required: [full_name, email, phone, account_type, company_name]

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
      required: [message]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
      required: [token, user]

    AuthMeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        company:
          $ref: "#/components/schemas/CompanyResponse"
      required: [user]

    ActivateBody:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
      required: [token, password]

    OnboardingBody:
      type: object
      properties:
        cr_number:
          type: string
        vat_number:
          type: string
        full_address:
          type: string
        categories_served:
          type: array
          items:
            type: string

    OnboardingResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        company:
          $ref: "#/components/schemas/CompanyResponse"
      required: [user]

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        real_name:
          type: string
        phone:
          type: string
        platform_alias:
          type: string
        company_id:
          type: string
        status:
          type: string
        activation_status:
          type: string
        language:
          type: string
        onboarding_completed:
          type: boolean
        created_at:
          type: string
      required: [id, email, role, real_name, platform_alias, company_id, status]

    CompanyResponse:
      type: object
      properties:
        id:
          type: string
        real_name:
          type: string
        platform_alias:
          type: string
        type:
          type: string
        cr_number:
          type: string
          nullable: true
        vat_number:
          type: string
          nullable: true
        status:
          type: string
        onboarding_completed:
          type: boolean
        subscription_tier:
          type: string
        categories_served:
          type: array
          items:
            type: string
      required: [id, real_name, platform_alias, type, status]

    Category:
      type: object
      properties:
        id:
          type: string
        name_en:
          type: string
        name_ar:
          type: string
        slug:
          type: string
        parent_id:
          type: string
          nullable: true
        icon_url:
          type: string
        sort_order:
          type: integer
      required: [id, name_en, name_ar, slug, sort_order]

    PackTypePricing:
      type: object
      properties:
        pack_type:
          type: string
        supplier_cost_sar:
          type: number
        min_order_qty:
          type: integer
      required: [pack_type, min_order_qty]

    MasterProduct:
      type: object
      properties:
        id:
          type: string
        master_product_code:
          type: string
        name_en:
          type: string
        name_ar:
          type: string
        description_en:
          type: string
        description_ar:
          type: string
        category_id:
          type: string
        specs:
          type: object
          additionalProperties:
            type: string
        images:
          type: array
          items:
            type: string
        pack_types:
          type: array
          items:
            type: string
        default_unit:
          type: string
        status:
          type: string
        created_at:
          type: string
      required: [id, name_en, name_ar, category_id, status]

    MasterProductListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MasterProduct"
        total:
          type: integer
      required: [data, total]

    Bundle:
      type: object
      properties:
        id:
          type: string
        name_en:
          type: string
        name_ar:
          type: string
        slug:
          type: string
        image_url:
          type: string
        description:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/BundleItem"
      required: [id, name_en, slug]

    BundleItem:
