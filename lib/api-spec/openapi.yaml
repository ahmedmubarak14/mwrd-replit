      type: object
      properties:
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [admin, ops, finance, cs]
      required: [email, full_name, role]

    AdminApproveProductRequestResponse:
      type: object
      properties:
        request:
          $ref: "#/components/schemas/ProductAdditionRequest"
        masterProduct:
          $ref: "#/components/schemas/MasterProduct"
      required: [request, masterProduct]

    RejectProductRequestBody:
      type: object
      properties:
        reason:
          type: string
      required: [reason]
