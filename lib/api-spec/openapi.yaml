openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: mwrd B2B Procurement Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication (public — client & supplier)
  - name: backoffice-auth
    description: Authentication (backoffice — admin/ops/finance/cs)
  - name: catalog
    description: Master catalog (categories, products, bundles)
  - name: offers
    description: Supplier offers & pricing
  - name: cart
    description: Cart management
  - name: rfq
    description: RFQ (Request For Quote) management
  - name: quote
    description: Quote management
  - name: order
    description: Purchase orders, DNs, GRNs, invoices
  - name: account
    description: Company account, members, roles, approval tree, addresses
  - name: favorites
    description: Favorites & company catalogs
  - name: notifications
    description: In-app notifications
  - name: backoffice
    description: Backoffice operations (admin/ops only)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new client or supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registration submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in (client or supplier)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out
      responses:
        "204":
          description: Signed out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Not authenticated

  /auth/activate:
    post:
      operationId: activateAccount
      tags: [auth]
      summary: Activate account with token (set password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateBody"
      responses:
        "200":
          description: Account activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/onboarding:
    post:
      operationId: completeOnboarding
      tags: [auth]
      summary: Complete onboarding after activation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingBody"
      responses:
        "200":
          description: Onboarding complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingResponse"

  /backoffice/auth/login:
    post:
      operationId: backofficeLogin
      tags: [backoffice-auth]
      summary: Sign in to backoffice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /backoffice/auth/me:
    get:
      operationId: getBackofficeMe
      tags: [backoffice-auth]
      summary: Get current backoffice user
      responses:
        "200":
          description: Current backoffice user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Not authenticated

  /backoffice/auth/logout:
    post:
      operationId: backofficeLogout
      tags: [backoffice-auth]
      summary: Sign out from backoffice
      responses:
        "204":
          description: Signed out

  /catalog/categories:
    get:
      operationId: listCategories
      tags: [catalog]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /catalog/products:
    get:
      operationId: listMasterProducts
      tags: [catalog]
      summary: Browse master products
      parameters:
        - name: category_id
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterProductListResponse"

  /catalog/products/{id}:
    get:
      operationId: getMasterProduct
      tags: [catalog]
      summary: Get a single master product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Master product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MasterProduct"
        "404":
          description: Not found

  /catalog/bundles:
    get:
      operationId: listBundles
      tags: [catalog]
      summary: List all bundles
      responses:
        "200":
          description: List of bundles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bundle"

  /catalog/bundles/{slug}:
    get:
      operationId: getBundle
      tags: [catalog]
      summary: Get bundle by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bundle"
        "404":
          description: Not found

  /offers:
    get:
      operationId: listMyOffers
      tags: [offers]
      summary: List supplier's own offers
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: approval_status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferListResponse"
    post:
      operationId: createOffer
      tags: [offers]
      summary: Create a new offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfferBody"
      responses:
        "201":
          description: Offer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"

  /offers/{id}:
    get:
      operationId: getOffer
      tags: [offers]
      summary: Get a single offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"
        "404":
          description: Not found
    patch:
      operationId: updateOffer
      tags: [offers]
      summary: Update an offer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOfferBody"
      responses:
        "200":
          description: Updated offer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offer"

  /offers/product-requests:
    get:
      operationId: listMyProductRequests
      tags: [offers]
      summary: List supplier's product addition requests
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductAdditionRequest"
    post:
      operationId: createProductRequest
      tags: [offers]
      summary: Submit a product addition request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequestBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductAdditionRequest"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get active cart
      responses:
        "200":
          description: Active cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items:
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartBody"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items/{itemId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemBody"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/bundle/{bundleId}:
    post:
      operationId: addBundleToCart
      tags: [cart]
      summary: Add all bundle items to cart
      parameters:
        - name: bundleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/save:
    post:
      operationId: saveCart
      tags: [cart]
      summary: Save current cart as named draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveCartBody"
      responses:
        "200":
          description: Saved cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/saved:
    get:
      operationId: listSavedCarts
      tags: [cart]
      summary: List saved RFQ drafts
      responses:
        "200":
          description: Saved carts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cart"

  /cart/saved/{cartId}/resume:
    post:
      operationId: resumeSavedCart
      tags: [cart]
      summary: Resume a saved cart
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/submit-rfq:
    post:
      operationId: submitCartAsRFQ
      tags: [cart]
      summary: Submit active cart as a new RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitCartAsRFQBody"
      responses:
        "201":
          description: RFQ created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFQ"

  /rfqs:
    get:
      operationId: listRFQs
      tags: [rfq]
      summary: List RFQs
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFQListResponse"
    post:
      operationId: createRFQ
      tags: [rfq]
      summary: Create a custom-request RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRFQBody"
      responses:
        "201":
          description: RFQ created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFQ"

  /rfqs/{id}:
    get:
      operationId: getRFQ
      tags: [rfq]
      summary: Get a single RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RFQ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFQ"
        "404":
          description: Not found

  /rfqs/{id}/quotes:
    get:
      operationId: listQuotesForRFQ
      tags: [rfq]
      summary: List quotes for an RFQ
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"

  /rfqs/{id}/award/full-basket:
    post:
      operationId: awardFullBasket
      tags: [rfq]
      summary: Award entire RFQ to one supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AwardFullBasketBody"
      responses:
        "201":
          description: CPO + SPO created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/POPairResponse"

  /rfqs/{id}/award/per-line:
    post:
      operationId: awardPerLine
      tags: [rfq]
      summary: Award individual lines to different suppliers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AwardPerLineBody"
      responses:
        "201":
          description: PO pairs created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/POPairResponse"

  /quotes:
    get:
      operationId: listMyQuotes
      tags: [quote]
      summary: List supplier's own quotes
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteListResponse"

  /quotes/{id}:
    get:
      operationId: getQuote
      tags: [quote]
      summary: Get a single quote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    patch:
      operationId: editQuote
      tags: [quote]
      summary: Edit quote before sending
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditQuoteBody"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{id}/send:
    post:
      operationId: sendQuote
      tags: [quote]
      summary: Send quote to client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /orders:
    get:
      operationId: listOrders
      tags: [order]
      summary: List orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of POs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PO"

  /orders/pending-approval:
    get:
      operationId: listPendingApproval
      tags: [order]
      summary: List orders awaiting my approval
      responses:
        "200":
          description: Pending approval tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalTaskWithOrder"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [order]
      summary: Get order detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PO"
        "404":
          description: Not found

  /orders/{id}/approval:
    get:
      operationId: getOrderApprovalStatus
      tags: [order]
      summary: Get approval chain status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approval status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalStatusResponse"

  /orders/{id}/approve:
    post:
      operationId: approveOrder
      tags: [order]
      summary: Approve a pending order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveOrderBody"
      responses:
        "200":
          description: Approval task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalTask"

  /orders/{id}/reject:
    post:
      operationId: rejectOrder
      tags: [order]
      summary: Reject a pending order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectOrderBody"
      responses:
        "200":
          description: Approval task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalTask"

  /orders/{id}/dn:
    post:
      operationId: createDeliveryNote
      tags: [order]
      summary: Create delivery note for SPO (supplier only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDNBody"
      responses:
        "201":
          description: Delivery note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DN"

  /orders/{id}/grn:
    post:
      operationId: createGRN
      tags: [order]
      summary: Create goods receipt note (client only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGRNBody"
      responses:
        "201":
          description: GRN created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GRN"

  /orders/{id}/invoice:
    get:
      operationId: getInvoice
      tags: [order]
      summary: Get invoice for order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /orders/{id}/pay:
    post:
      operationId: payInvoice
      tags: [order]
      summary: Initiate payment for invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayInvoiceBody"
      responses:
        "200":
          description: Invoice paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /account/members:
    get:
      operationId: listCompanyMembers
      tags: [account]
      summary: List company members
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyMember"
    post:
      operationId: inviteCompanyMember
      tags: [account]
      summary: Invite a new member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCompanyMemberBody"
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyMember"

  /account/roles:
    get:
      operationId: listCompanyRoles
      tags: [account]
      summary: List company roles
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyRole"
    post:
      operationId: createCompanyRole
      tags: [account]
      summary: Create a company role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRoleBody"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyRole"

  /account/approval-tree:
    get:
      operationId: listApprovalTree
      tags: [account]
      summary: Get approval tree nodes
      responses:
        "200":
          description: Approval nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApprovalNode"
    post:
      operationId: setApprover
      tags: [account]
      summary: Set direct approver for a member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetApproverBody"
      responses:
        "200":
          description: Approval node updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalNode"

  /account/addresses:
    get:
      operationId: listAddresses
      tags: [account]
      summary: List company addresses
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [delivery, billing]
      responses:
        "200":
          description: Addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
    post:
      operationId: createAddress
      tags: [account]
      summary: Add a new address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressBody"
      responses:
        "201":
