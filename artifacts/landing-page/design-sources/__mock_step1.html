<!doctype html><html><head><meta charset="utf-8"><script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',ui-sans-serif,system-ui;margin:0;background:linear-gradient(135deg,#FFE9DF 0%,#FFD1BD 50%,#FFB694 100%);}
.shadow-card{box-shadow:0 32px 64px -12px rgba(16,24,40,.18),0 0 0 1px rgba(16,24,40,.06)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
</style></head>
<body><div style="width:1120px;height:840px;display:flex;align-items:center;justify-content:center;padding:60px">
  <div class="shadow-card" style="width:760px;background:#fff;border-radius:20px;padding:32px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#FF6D43,#FF8A5C);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">01</div>
        <div>
          <div style="font-size:11px;font-weight:600;color:#FF6D43;letter-spacing:.06em">NEW REQUEST</div>
          <div style="font-size:18px;font-weight:600;color:#101828">Office furniture · 50 desks</div>
        </div>
      </div>
      <span class="pill" style="background:#ECFDF3;color:#079455">● Draft saved</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
      <div style="background:#F9FAFB;border:1px solid #EAECF0;border-radius:10px;padding:12px">
        <div style="font-size:11px;color:#667085;font-weight:500;margin-bottom:4px">Category</div>
        <div style="font-size:14px;color:#101828;font-weight:600">Office &amp; furniture</div>
      </div>
      <div style="background:#F9FAFB;border:1px solid #EAECF0;border-radius:10px;padding:12px">
        <div style="font-size:11px;color:#667085;font-weight:500;margin-bottom:4px">Delivery to</div>
        <div style="font-size:14px;color:#101828;font-weight:600">Riyadh, KSA</div>
      </div>
      <div style="background:#F9FAFB;border:1px solid #EAECF0;border-radius:10px;padding:12px">
        <div style="font-size:11px;color:#667085;font-weight:500;margin-bottom:4px">Quantity</div>
        <div style="font-size:14px;color:#101828;font-weight:600">50 units</div>
      </div>
      <div style="background:#F9FAFB;border:1px solid #EAECF0;border-radius:10px;padding:12px">
        <div style="font-size:11px;color:#667085;font-weight:500;margin-bottom:4px">Needed by</div>
        <div style="font-size:14px;color:#101828;font-weight:600">May 28, 2026</div>
      </div>
    </div>
    <div style="background:#FFF6F1;border:1px dashed #FFB694;border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px;margin-bottom:18px">
      <div style="width:30px;height:30px;border-radius:8px;background:#FF6D43;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px">📎</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#101828">Attach specs (optional)</div>
        <div style="font-size:11px;color:#667085">PDF, DWG, XLS · drag &amp; drop</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button style="padding:10px 16px;border-radius:10px;background:#fff;border:1px solid #D0D5DD;color:#344054;font-weight:600;font-size:13px">Save draft</button>
      <button style="padding:10px 18px;border-radius:10px;background:#FF6D43;border:none;color:#fff;font-weight:600;font-size:13px;box-shadow:0 1px 2px rgba(16,24,40,.05)">Publish RFQ →</button>
    </div>
  </div>
</div></body></html>
