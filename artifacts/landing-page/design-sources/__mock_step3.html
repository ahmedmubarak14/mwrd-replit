<!doctype html><html><head><meta charset="utf-8"><script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',ui-sans-serif,system-ui;margin:0;background:linear-gradient(135deg,#FFE9DF 0%,#FFD1BD 50%,#FFB694 100%);}
.shadow-card{box-shadow:0 32px 64px -12px rgba(16,24,40,.18),0 0 0 1px rgba(16,24,40,.06)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:600}
</style></head>
<body><div style="width:1120px;height:840px;display:flex;align-items:center;justify-content:center;padding:60px">
  <div class="shadow-card" style="width:760px;background:#fff;border-radius:20px;padding:28px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
      <div>
        <div style="font-size:11px;font-weight:600;color:#FF6D43;letter-spacing:.06em">03 · COMPARE &amp; AWARD</div>
        <div style="font-size:18px;font-weight:600;color:#101828;margin-top:2px">RFQ-2104 · 3 quotes received</div>
      </div>
      <span class="pill" style="background:#ECFDF3;color:#079455">Closing in 6h</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px">
      <div style="border:2px solid #FF6D43;border-radius:12px;padding:14px;background:#FFF6F1;position:relative">
        <span class="pill" style="background:#FF6D43;color:#fff;position:absolute;top:-10px;right:10px">★ Best</span>
        <div style="font-size:12px;color:#667085;font-weight:500">Al-Tamimi</div>
        <div style="font-size:20px;font-weight:700;color:#101828;margin-top:4px">SAR 184,500</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <span class="pill" style="background:#fff;color:#079455;border:1px solid #D1FADF">14d</span>
          <span class="pill" style="background:#fff;color:#1D4ED8;border:1px solid #DBEAFE">2yr warranty</span>
        </div>
      </div>
      <div style="border:1px solid #EAECF0;border-radius:12px;padding:14px">
        <div style="font-size:12px;color:#667085;font-weight:500">Saudi Furniture</div>
        <div style="font-size:20px;font-weight:700;color:#101828;margin-top:4px">SAR 198,200</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <span class="pill" style="background:#F9FAFB;color:#475467;border:1px solid #EAECF0">21d</span>
          <span class="pill" style="background:#F9FAFB;color:#475467;border:1px solid #EAECF0">1yr warranty</span>
        </div>
      </div>
      <div style="border:1px solid #EAECF0;border-radius:12px;padding:14px">
        <div style="font-size:12px;color:#667085;font-weight:500">Rakiz Trading</div>
        <div style="font-size:20px;font-weight:700;color:#101828;margin-top:4px">SAR 211,000</div>
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <span class="pill" style="background:#F9FAFB;color:#475467;border:1px solid #EAECF0">10d</span>
          <span class="pill" style="background:#F9FAFB;color:#475467;border:1px solid #EAECF0">3yr warranty</span>
        </div>
      </div>
    </div>

    <div style="background:#F9FAFB;border:1px solid #EAECF0;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:11px;color:#667085;font-weight:500">Estimated savings vs market</div>
        <div style="font-size:20px;font-weight:700;color:#079455">SAR 41,300 · 18%</div>
      </div>
      <div style="height:48px;width:160px;display:flex;align-items:end;gap:4px">
        <div style="flex:1;height:60%;background:#FFD1BD;border-radius:3px"></div>
        <div style="flex:1;height:42%;background:#FFD1BD;border-radius:3px"></div>
        <div style="flex:1;height:78%;background:#FF8A5C;border-radius:3px"></div>
        <div style="flex:1;height:55%;background:#FFD1BD;border-radius:3px"></div>
        <div style="flex:1;height:95%;background:#FF6D43;border-radius:3px"></div>
        <div style="flex:1;height:70%;background:#FFD1BD;border-radius:3px"></div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button style="padding:10px 16px;border-radius:10px;background:#fff;border:1px solid #D0D5DD;color:#344054;font-weight:600;font-size:13px">Negotiate</button>
      <button style="padding:10px 20px;border-radius:10px;background:#FF6D43;border:none;color:#fff;font-weight:600;font-size:13px">Award to Al-Tamimi ✓</button>
    </div>
  </div>
</div></body></html>
