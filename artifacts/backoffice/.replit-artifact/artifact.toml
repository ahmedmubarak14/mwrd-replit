kind = "web"
previewPath = "/backoffice/"
title = "MWRD Backoffice"
version = "1.0.0"
id = "artifacts/backoffice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/backoffice/" ]
localPort = 22138

[services.development]
run = "pnpm --filter @workspace/backoffice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/backoffice", "run", "build" ]
publicDir = "artifacts/backoffice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22138"
BASE_PATH = "/backoffice/"
