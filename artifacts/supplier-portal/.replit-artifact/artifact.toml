kind = "web"
previewPath = "/supplier/"
title = "MWRD Supplier Portal"
version = "1.0.0"
id = "artifacts/supplier-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/supplier/" ]
localPort = 20049

[services.development]
run = "pnpm --filter @workspace/supplier-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/supplier-portal", "run", "build" ]
publicDir = "artifacts/supplier-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20049"
BASE_PATH = "/supplier/"
